behaviors:
  ExplorerAgent:
    trainer_type: ppo

    max_steps: 500000

    time_horizon: 128
    summary_freq: 10000

    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

      curiosity:
        gamma: 0.99
        strength: 0.02
        encoding_size: 128